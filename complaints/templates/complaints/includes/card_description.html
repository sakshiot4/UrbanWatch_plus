<div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">

    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">
        Incident Description
    </h3>

    {% if edit_mode %}

        <!-- TITLE -->
        <label class="text-xs font-bold text-slate-400 uppercase">Title</label>
        {{ form.title }}

        <!-- DESCRIPTION -->
        <label class="text-xs font-bold text-slate-400 uppercase mt-5 block">
            Description
        </label>
        {{ form.description }}

        <!-- CATEGORY -->
        <label class="text-xs font-bold text-slate-400 uppercase mt-5 block">
            Category
        </label>
        {{ form.category }}

    {% else %}

        <p class="text-slate-700 leading-relaxed text-lg">
            {{ complaint.description }}
        </p>

    {% endif %}


    <!-- INFO STRIP (always visible) -->
    <div class="mt-6 flex flex-wrap gap-4 border-t border-slate-100 pt-6">

        <div class="flex items-center gap-2 text-sm text-slate-600">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">📂</span>
            <span class="font-medium capitalize">{{ complaint.category }}</span>
        </div>

        <div class="flex items-center gap-2 text-sm text-slate-600">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">📅</span>
            <span class="font-medium">{{ complaint.created_at|date:"M d, Y" }}</span>
        </div>

        <div class="flex items-center gap-2 text-sm text-slate-600">
            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">📍</span>
            <span class="font-medium capitalize">{{ complaint.region }}</span>
        </div>

    </div>
</div>
